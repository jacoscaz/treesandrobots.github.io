
# Basic
name:               "Trees and Robots"
description:        "A blog about programming and life in general written by @jacoscaz"

# URL
url:                "https://treesandrobots.com"
baseurl:            ""
permalink:          /:year/:month/:title.html

# Navigation
nav:
  - name:           "Home"
    href:           "/"
  - name:           "Writings"
    href:           "/writings.html"
    layout:         "post"
    rss:            "/feed.xml"
  - name:           "Now"
    href:           "/now.html"
  - name:           "About"
    href:           "/about.html"
  - name:           "Software"
    href:           "/software.html"
  - name:           "Projects"
    href:           "/projects.html"
  - name:           "Things"
    href:           "/things.html"
  - name:           "Sage"
    href:           "/sage.html"
    layout:         "sage"
    # rss:            "/feed-syslog.xml"

# Sass
sass:
  style:            :compressed


collections:
  sage:
    output: true

# Scopes
defaults:
  -
    scope:
      path:         ""
      type:         "pages"
    values:
      layout:       "page"
  -
    scope:
      path:         ""
      type:         "posts"
    values:
      layout:       "post"
  -
    scope:
      path:         ""
      type:         "sage"
    values:
      layout:       "sage"

markdown: kramdown
kramdown:
  input: GFM
  parse_block_html: false
